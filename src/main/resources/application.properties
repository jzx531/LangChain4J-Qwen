# ==========================================
# LangChain4j OpenAI Compatible Configuration (Aliyun Qwen)
# ==========================================

# Chat Model Configuration
langchain4j.open-ai.chat-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
langchain4j.open-ai.chat-model.api-key=${API-KEY}
langchain4j.open-ai.chat-model.model-name=qwen-plus
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

# Streaming Chat Model Configuration
langchain4j.open-ai.streaming-chat-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
langchain4j.open-ai.streaming-chat-model.api-key=${API-KEY}
langchain4j.open-ai.streaming-chat-model.model-name=qwen-plus
langchain4j.open-ai.streaming-chat-model.log-requests=true
langchain4j.open-ai.streaming-chat-model.log-responses=true

# Embedding Model Configuration
langchain4j.open-ai.embedding-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
langchain4j.open-ai.embedding-model.api-key=${API-KEY}
langchain4j.open-ai.embedding-model.model-name=text-embedding-v3
langchain4j.open-ai.embedding-model.log-requests=true
langchain4j.open-ai.embedding-model.log-responses=true
langchain4j.open-ai.embedding-model.max-segments-per-batch=10

# ==========================================
# LangChain4j Community Redis Configuration
# ==========================================
langchain4j.community.redis.host=localhost
langchain4j.community.redis.port=6379

# ==========================================
# Logging Configuration
# ==========================================
logging.level.dev.langchain4j=debug

# ==========================================
# Spring Data Redis Configuration
# ==========================================
spring.data.redis.host= localhost
spring.data.redis.port=6379
spring.data.redis.password=123456
spring.data.redis.database=1

# ==========================================
# Spring DataSource (MySQL) Configuration
# ==========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/springai?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=hlpjzx2003

# ==========================================
# MyBatis Configuration
# ==========================================
mybatis.configuration.map-underscore-to-camel-case=true